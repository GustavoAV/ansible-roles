name: CI
on:
  # trunk-ignore(yamllint/empty-values)
  pull_request:
  push:
    branches: [main]

permissions: read-all

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the codebase
        uses: actions/checkout@v4
      
      - name: List Ansible roles
        id: set-matrix
        run: |
          # Gather role directory names
          roles_json=$(find roles -maxdepth 1 -mindepth 1 -type d -printf '%f\n' | jq -R . | jq -s .)
          # Build a compact JSON matrix
          matrix=$(jq -c -n --argjson rs "$roles_json" '{role: $rs}')
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
    outputs:
      changed_roles: ${{ steps.set-matrix.outputs.matrix }}

  test:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout the codebase
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python packages
        run: |
          pipx install --include-deps ansible-dev-tools
          pipx inject --include-apps --include-deps ansible-dev-tools $(cat dev-requirements.txt)

      - name: Run Molecule tests
        run: |
          cd ${{ matrix.role }}/
          molecule test
